<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="读点书" />

    <link rel="icon" type="image/jpeg" sizes="192x192" href="icons/icon-192.jpg" />
    <link rel="apple-touch-icon" sizes="120x120" href="icons/icon-120.jpg" />
    <link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152.jpg" />
    <link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180.jpg" />
    <title>读点书</title>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "recharts": "https://esm.sh/recharts@^3.7.0",
    "@google/genai": "https://esm.sh/@google/genai@^1.40.0"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="index.tsx"></script>
  <div id="sync-diag-panel" style="display:block;position:fixed;bottom:0;left:0;right:0;z-index:99999;background:#fffbeb;border-top:2px solid #f59e0b;padding:8px 12px;max-height:30vh;overflow-y:auto;font-size:11px;font-family:monospace;color:#92400e;line-height:1.5"></div>
  <script>
    (function(){
      var panel = document.getElementById('sync-diag-panel');
      var lastLen = 0;
      setInterval(function(){
        try {
          var raw = localStorage.getItem('sync_diag_log');
          var entries = raw ? JSON.parse(raw) : [];
          if (entries.length === 0) { panel.style.display = 'none'; lastLen = 0; return; }
          if (entries.length === lastLen) return;
          lastLen = entries.length;
          var recent = entries.slice(-6);
          var html = '<div style="font-weight:bold;margin-bottom:4px">📋 同步诊断 (30s/次)</div>';
          recent.forEach(function(e){
            html += '<div><span style="color:#d97706">' + e.t.slice(11,19) + '</span> ' + e.msg + '</div>';
          });
          panel.innerHTML = html;
          panel.style.display = 'block';
        } catch(ex){}
      }, 2000);
    })();
  </script>

<div id="sd" style="position:fixed;bottom:0;left:0;right:0;z-index:2147483647;background:#111;color:#0f0;padding:6px 10px;font:11px monospace;max-height:25vh;overflow-y:auto;opacity:0.92;border-top:2px solid #0f0">⏳ 等待同步...</div>
<script>
(function(){
  var p=document.getElementById('sd');
  var last='';
  setInterval(function(){
    var raw=localStorage.getItem('sync_diag_log');
    if(!raw){p.innerHTML='⏳ sync_diag_log 为空 —— autoUpload 尚未运行';return;}
    if(raw===last)return; last=raw;
    var entries=JSON.parse(raw).slice(-6);
    var h='<b>📋 同步诊断</b><br>';
    entries.forEach(function(e){h+='<span style=color:#888>'+e.t.slice(11,19)+'</span> '+e.msg+'<br>';});
    p.innerHTML=h;
  },2000);
  // Also write a heartbeat so we know this script runs
  var hb=Number(localStorage.getItem('diag_heartbeat')||0);
  localStorage.setItem('diag_heartbeat',hb+1);
  p.innerHTML='⏳ 脚本已运行('+hb+')，等待 sync_diag_log...';
})();
</script>
</body>
</html>
