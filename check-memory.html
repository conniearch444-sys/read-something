<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>查看跨书记忆库</title>
  <style>
    body {
      font-family: monospace;
      background: #1a1a1a;
      color: #e0e0e0;
      padding: 20px;
      max-width: 800px;
      margin: 0 auto;
      white-space: pre-wrap;
      word-break: break-all;
    }
    h2 { color: #a0d2f0; }
  </style>
</head>
<body>
  <h2>📋 跨书记忆库内容</h2>
  <div id="content">读取中...</div>
  <script>
    const raw = localStorage.getItem('cross_book_memories_v1');
    if (raw) {
      const data = JSON.parse(raw);
      document.getElementById('content').textContent = JSON.stringify(data, null, 2);
    } else {
      document.getElementById('content').textContent = '记忆库为空';
    }
  </script>
</body>
</html>
