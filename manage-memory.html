<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>记忆库管理</title>
  <style>
    body { font-family: -apple-system, sans-serif; max-width: 800px; margin: 20px auto; padding: 16px; background: #1a1a1a; color: #e0e0e0; }
    h1 { font-size: 1.3em; color: #fff; }
    .item { background: #2a2a2a; border-radius: 12px; padding: 14px; margin: 10px 0; display: flex; align-items: flex-start; gap: 12px; }
    .item input { margin-top: 4px; flex-shrink: 0; }
    .content { flex: 1; font-size: 0.88em; line-height: 1.5; word-break: break-all; }
    .meta { font-size: 0.75em; color: #888; margin-top: 6px; }
    button { background: #d94a4a; color: #fff; border: none; padding: 12px 20px; border-radius: 8px; font-size: 1em; cursor: pointer; margin: 16px 4px 0 0; }
    button.clear-btn { background: #4a90d9; }
    #status { margin-top: 12px; font-size: 0.9em; }
  </style>
</head>
<body>

<h1>📋 跨书记忆管理器</h1>
<p style="color:#aaa;font-size:0.9em;">勾选想要删除的记忆条目，然后点“删除选中”</p>

<div id="list">读取中...</div>

<button class="clear-btn" onclick="window.location.reload()">🔄 刷新列表</button>
<button onclick="deleteSelected()">🗑️ 删除选中</button>
<button class="clear-btn" onclick="deleteAll()">⚠️ 清空全部</button>

<div id="status"></div>

<script>
  const KEY = 'cross_book_memories_v1';
  let allMemories = [];

  function load() {
    try {
      const raw = localStorage.getItem(KEY);
      allMemories = raw ? JSON.parse(raw) : [];
    } catch {
      allMemories = [];
    }
  }

  function render() {
    if (allMemories.length === 0) {
      document.getElementById('list').innerHTML = '<p style="color:#888;">记忆库为空</p>';
      return;
    }
    document.getElementById('list').innerHTML = allMemories.map((m, i) => `
      <div class="item">
        <input type="checkbox" id="cb_${i}" />
        <div class="content">
          <div><strong>角色：</strong>${m.characterName || '未知'}</div>
          <div style="margin-top:4px;">${m.summary || '(空)'}</div>
          <div class="meta">更新于 ${new Date(m.updatedAt).toLocaleString('zh-CN')}</div>
        </div>
      </div>
    `).join('');
  }

  function getSelectedIndices() {
    const indices = [];
    for (let i = 0; i < allMemories.length; i++) {
      const cb = document.getElementById('cb_' + i);
      if (cb?.checked) indices.push(i);
    }
    return indices.sort((a, b) => b - a); // 从后往前删，避免索引偏移
  }

  function save() {
    localStorage.setItem(KEY, JSON.stringify(allMemories));
  }

  function deleteSelected() {
    const selected = getSelectedIndices();
    if (selected.length === 0) {
      document.getElementById('status').innerHTML = '<span style="color:#d9a0a0;">请先勾选要删除的条目</span>';
      return;
    }
    if (!confirm(`确定删除 ${selected.length} 条记忆吗？此操作不可恢复。`)) return;
    for (const i of selected) {
      allMemories.splice(i, 1);
    }
    save();
    document.getElementById('status').innerHTML = `<span style="color:#90c890;">✅ 已删除 ${selected.length} 条记忆</span>`;
    render();
  }

  function deleteAll() {
    if (!confirm('确定清空所有跨书记忆吗？此操作不可恢复，所有角色的记忆都会被删除。')) return;
    allMemories = [];
    save();
    document.getElementById('status').innerHTML = '<span style="color:#90c890;">✅ 已清空全部记忆</span>';
    render();
  }

  load();
  render();
</script>

</body>
</html>
